name: Deploy Backend 1 to EC2

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend1/**'
      - '.github/workflows/deploy-backend1.yml'

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "backend1/**"
          target: ${{ secrets.DEPLOY_PATH || '/home/ubuntu/backend1' }}
          strip_components: 1
          rm: false

      - name: SSH and Restart Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/home/ubuntu/backend1' }}
            
            # Setup virtual environment if it doesn't exist
            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi
            
            # Activate venv and install requirements
            source .venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            # Setup systemd service for Backend 1 if it doesn't exist
            if [ ! -f "/etc/systemd/system/backend1.service" ]; then
              echo "Creating backend1.service..."
              sudo bash -c 'cat > /etc/systemd/system/backend1.service <<EOF
              [Unit]
              Description=Backend 1 Controller FastAPI Service
              After=network.target

              [Service]
              User=ubuntu
              WorkingDirectory='${{ secrets.DEPLOY_PATH || '/home/ubuntu/backend1' }}'
              ExecStart='${{ secrets.DEPLOY_PATH || '/home/ubuntu/backend1' }}'/.venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000
              Restart=always
              Environment=AWS_DEPLOYMENT=true
              Environment=AWS_REGION=us-east-1
              Environment=BACKEND2_ASG_NAME=backend2-asg
              # Environment=BACKEND2_URL=http://<backend2-alb-dns>

              [Install]
              WantedBy=multi-user.target
              EOF'
              
              sudo systemctl daemon-reload
              sudo systemctl enable backend1.service
            fi
            
            # Restart backend1 service to load latest code changes
            sudo systemctl restart backend1.service
            sudo systemctl status backend1.service --no-pager
