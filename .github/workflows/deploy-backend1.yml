name: Deploy Backend 1 to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend1/**'
      - '.github/workflows/deploy-backend1.yml'

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "backend1/**"
          target: ${{ secrets.DEPLOY_PATH || '/home/ubuntu/backend1' }}
          strip_components: 1
          rm: false

      - name: SSH and Restart Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/home/ubuntu/backend1' }}
            
            # Ensure Docker is installed
            if ! command -v docker &> /dev/null; then
              echo "Docker not found. Installing Docker..."
              sudo apt-get update -y
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ${{ secrets.EC2_USERNAME || 'ubuntu' }}
            fi
            
            # Stop and disable legacy systemd service if active/enabled
            if systemctl is-active --quiet backend1.service; then
              echo "Stopping legacy systemd backend1 service..."
              sudo systemctl stop backend1.service
            fi
            if systemctl is-enabled --quiet backend1.service; then
              echo "Disabling legacy systemd backend1 service..."
              sudo systemctl disable backend1.service
            fi
            
            # Build the Docker image
            echo "Building Backend 1 Docker image..."
            sudo docker build -t backend1:latest .
            
            # Stop and remove existing container
            echo "Stopping and removing existing Backend 1 container..."
            sudo docker stop backend1 || true
            sudo docker rm backend1 || true
            
            # Run the Backend 1 container
            echo "Running Backend 1 container..."
            sudo docker run -d \
              --name backend1 \
              --restart always \
              -p 8000:8000 \
              -e AWS_DEPLOYMENT=true \
              -e AWS_REGION="${{ secrets.AWS_REGION || 'us-east-1' }}" \
              -e BACKEND2_ASG_NAME="${{ secrets.ASG_NAME || 'backend2-asg' }}" \
              -e BACKEND2_URL="${{ secrets.BACKEND2_URL || '' }}" \
              backend1:latest
            
            # Print container status
            sudo docker ps -a --filter name=backend1

