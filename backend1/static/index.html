<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="glass-container">
        <header>
            <div class="logo">
                <span class="pulse-active"></span>
                <h1>Microservice Control Center</h1>
            </div>
            <p class="subtitle">Monitor and control distributed services</p>
        </header>

        <main class="dashboard">
            <!-- Backend 1 Card -->
            <div class="card active" id="backend1-card">
                <div class="card-header">
                    <h2>Backend 1</h2>
                    <span class="status-badge running">Running</span>
                </div>
                <div class="card-body">
                    <p class="status-text font-accent">backend1 start</p>
                    <p class="desc">Active and hosting UI on port 8000.</p>
                </div>
            </div>

            <!-- Backend 2 Card -->
            <div class="card stopped" id="backend2-card">
                <div class="card-header">
                    <h2>Backend 2</h2>
                    <span class="status-badge stopped" id="backend2-badge">Offline</span>
                </div>
                <div class="card-body">
                    <p class="status-text" id="backend2-status-text">backend 2 start to clickthis button button Start
                    </p>

                    <div class="action-section">
                        <button id="start-btn" class="btn btn-primary" onclick="startBackend2()">
                            <span class="btn-text">Start</span>
                            <span class="spinner" style="display: none;"></span>
                        </button>
                        <button id="stop-btn" class="btn btn-danger" onclick="stopBackend2()" style="display: none;">
                            Stop
                        </button>
                        <a id="open-ui-btn" href="http://127.0.0.1:8001" target="_blank" rel="noopener noreferrer"
                            class="btn btn-info" style="display: none;">
                            Open UI
                        </a>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>System status: <span id="overall-status">Operational</span></p>
        </footer>
    </div>

    <script>
        const backend2Card = document.getElementById('backend2-card');
        const backend2Badge = document.getElementById('backend2-badge');
        const backend2StatusText = document.getElementById('backend2-status-text');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const openUiBtn = document.getElementById('open-ui-btn');
        const btnText = startBtn.querySelector('.btn-text');
        const spinner = startBtn.querySelector('.spinner');

        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                if (data.backend2 === 'running') {
                    setBackend2Running(data.backend2_url);
                } else if (data.backend2 === 'starting') {
                    setBackend2Starting();
                } else {
                    // Only reset to stopped if we are not currently starting it
                    if (!backend2Card.classList.contains('loading')) {
                        setBackend2Stopped();
                    }
                }
            } catch (error) {
                console.error("Failed to check status:", error);
            }
        }

        function setBackend2Running(backend2Url) {
            backend2Card.classList.remove('stopped', 'loading');
            backend2Card.classList.add('active');

            backend2Badge.className = 'status-badge running';
            backend2Badge.style.cssText = '';
            backend2Badge.textContent = 'Active';

            backend2StatusText.textContent = 'backend 2 are running';
            backend2StatusText.className = 'status-text font-accent running-text';

            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-flex';
            openUiBtn.style.display = 'inline-flex';

            if (backend2Url) {
                openUiBtn.href = backend2Url;
            } else {
                openUiBtn.href = 'http://127.0.0.1:8001/';
            }

            spinner.style.display = 'none';
            btnText.style.display = 'inline';
            startBtn.disabled = false;
        }

        function setBackend2Starting() {
            backend2Card.classList.remove('stopped', 'active');
            backend2Card.classList.add('loading');

            backend2Badge.className = 'status-badge';
            backend2Badge.style.background = 'rgba(255, 152, 0, 0.1)';
            backend2Badge.style.color = '#ff9800';
            backend2Badge.style.border = '1px solid rgba(255, 152, 0, 0.2)';
            backend2Badge.textContent = 'Starting';

            backend2StatusText.textContent = 'backend 2 is starting...';
            backend2StatusText.className = 'status-text';

            startBtn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'inline-block';

            startBtn.style.display = 'inline-flex';
            stopBtn.style.display = 'none';
            openUiBtn.style.display = 'none';
        }

        function setBackend2Stopped() {
            backend2Card.classList.remove('active', 'loading');
            backend2Card.classList.add('stopped');

            backend2Badge.className = 'status-badge stopped';
            backend2Badge.style.cssText = '';
            backend2Badge.textContent = 'Offline';

            backend2StatusText.textContent = 'backend 2 start to clickthis button button Start';
            backend2StatusText.className = 'status-text';

            startBtn.style.display = 'inline-flex';
            stopBtn.style.display = 'none';
            openUiBtn.style.display = 'none';

            spinner.style.display = 'none';
            btnText.style.display = 'inline';
            startBtn.disabled = false;
        }

        async function startBackend2() {
            // UI Loading state
            backend2Card.classList.add('loading');
            startBtn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'inline-block';

            try {
                const response = await fetch('/api/start', { method: 'POST' });
                const data = await response.json();

                if (data.status === 'starting' || data.status === 'running') {
                    // Poll status for a few minutes until active (ASG provisioning may take 1-3 minutes)
                    let attempts = 0;
                    const interval = setInterval(async () => {
                        attempts++;
                        const checkRes = await fetch('/api/status');
                        const checkData = await checkRes.json();
                        if (checkData.backend2 === 'running') {
                            clearInterval(interval);
                            setBackend2Running(checkData.backend2_url);
                        } else if (checkData.backend2 === 'starting') {
                            setBackend2Starting();
                        } else if (attempts > 180) {
                            clearInterval(interval);
                            setBackend2Stopped();
                            alert("Backend 2 failed to respond within 3 minutes. Check AWS Auto Scaling Group status and logs.");
                        }
                    }, 1000);
                } else {
                    setBackend2Stopped();
                }
            } catch (error) {
                console.error("Error starting Backend 2:", error);
                setBackend2Stopped();
            }
        }

        async function stopBackend2() {
            try {
                const response = await fetch('/api/stop', { method: 'POST' });
                const data = await response.json();
                if (data.status === 'stopped') {
                    setBackend2Stopped();
                }
            } catch (error) {
                console.error("Error stopping Backend 2:", error);
            }
        }

        // Initial check and periodic polling
        checkStatus();
        setInterval(checkStatus, 3000);
    </script>
</body>

</html>
