AWSTemplateFormatVersion: '2012-10-17'
Description: 'CloudFormation Stack for Multi-Service Control Center (Backend 2 ECR, IAM Roles, Launch Template, and ASG)'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'Select the VPC where the Security Groups and ASG should be deployed.'

  Subnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: 'Select the Subnets for the Auto Scaling Group.'

  InstanceType:
    Type: String
    Default: 't3.micro'
    Description: 'EC2 instance type for Backend 2.'

  ECRRepositoryName:
    Type: String
    Default: 'backend2'
    Description: 'The name of the ECR repository to be created.'

  ASGName:
    Type: String
    Default: 'backend2-asg'
    Description: 'The name of the Backend 2 Auto Scaling Group.'

  LatestUbuntuAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id'
    Description: 'The SSM Parameter Path to fetch the latest Ubuntu AMI ID.'

Resources:
  # 1. Amazon ECR Repository
  Backend2ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref ECRRepositoryName
      ImageScanningConfiguration:
        ScanOnPush: true

  # 2. IAM Roles
  # IAM Role for Backend 1 EC2 Instance (to describe/update ASG)
  Backend1EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-Backend1Role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: Backend1ASGControlPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - autoscaling:DescribeAutoScalingGroups
                  - autoscaling:UpdateAutoScalingGroup
                  - ec2:DescribeInstances
                Resource: '*'

  Backend1InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-Backend1InstanceProfile'
      Roles:
        - !Ref Backend1EC2Role

  # IAM Role for Backend 2 EC2 Instances (to pull from ECR)
  Backend2EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-Backend2Role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

  Backend2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-Backend2InstanceProfile'
      Roles:
        - !Ref Backend2EC2Role

  # 3. Security Groups
  Backend1SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security Group for Backend 1 Controller'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  Backend2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security Group for Backend 2 Workers'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8001
          ToPort: 8001
          SourceSecurityGroupId: !Ref Backend1SecurityGroup
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  # 4. Launch Template
  Backend2LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub '${AWS::StackName}-backend2-lt'
      LaunchTemplateData:
        ImageId: !Ref LatestUbuntuAmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt Backend2InstanceProfile.Arn
        SecurityGroupIds:
          - !Ref Backend2SecurityGroup
        UserData:
          Fn::Base64: !Sub |
            #!/usr/bin/env bash
            set -e

            echo "Updating packages and installing Docker / AWS CLI..."
            apt-get update -y
            apt-get install -y docker.io awscli

            # Start and enable Docker service
            systemctl start docker
            systemctl enable docker

            # Setup ECR details
            AWS_REGION="${AWS::Region}"
            ECR_REGISTRY="${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com"
            ECR_REPOSITORY="${ECRRepositoryName}"
            IMAGE_TAG="latest"
            FULL_IMAGE_URI="${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepositoryName}:latest"

            echo "Authenticating Docker with Amazon ECR..."
            for i in {1..5}; do
                aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY" && break || sleep 5
            done

            echo "Pulling image from ECR: $FULL_IMAGE_URI..."
            docker pull "$FULL_IMAGE_URI"

            echo "Running Backend 2 Container..."
            docker stop backend2-container || true
            docker rm backend2-container || true

            docker run -d \
              --name backend2-container \
              --restart always \
              -p 8001:8001 \
              -e AWS_DEPLOYMENT=true \
              -e AWS_REGION="$AWS_REGION" \
              -e BACKEND2_ASG_NAME="${ASGName}" \
              -e IDLE_TIMEOUT_SECONDS="600" \
              "$FULL_IMAGE_URI"

            echo "Backend 2 container deployment complete!"

  # 5. Auto Scaling Group
  Backend2AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Ref ASGName
      LaunchTemplate:
        LaunchTemplateId: !Ref Backend2LaunchTemplate
        Version: !GetAtt Backend2LaunchTemplate.LatestVersionNumber
      MinSize: '0'
      MaxSize: '1'
      DesiredCapacity: '0'
      VPCZoneIdentifier: !Ref Subnets
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Backend2-Worker'
          PropagateAtLaunch: true

Outputs:
  ECRRepositoryUri:
    Description: 'URI of the ECR Repository for Backend 2'
    Value: !GetAtt Backend2ECRRepository.RepositoryUri
    Export:
      Name: !Sub '${AWS::StackName}-ECRRepositoryUri'

  AutoScalingGroupName:
    Description: 'Backend 2 Auto Scaling Group Name'
    Value: !Ref Backend2AutoScalingGroup
    Export:
      Name: !Sub '${AWS::StackName}-AutoScalingGroupName'

  LaunchTemplateName:
    Description: 'Backend 2 Launch Template Name'
    Value: !Ref Backend2LaunchTemplate
    Export:
      Name: !Sub '${AWS::StackName}-LaunchTemplateName'

  Backend1InstanceProfileName:
    Description: 'IAM Instance Profile for Backend 1'
    Value: !Ref Backend1InstanceProfile
    Export:
      Name: !Sub '${AWS::StackName}-Backend1InstanceProfileName'

  Backend1SecurityGroupId:
    Description: 'Security Group ID for Backend 1'
    Value: !Ref Backend1SecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-Backend1SecurityGroupId'
